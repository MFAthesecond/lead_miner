<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Lead Finder</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;padding:20px}
    .container{max-width:1700px;margin:0 auto}
    .nav{display:flex;gap:8px;margin-bottom:14px}
    .nav a{padding:7px 14px;border-radius:8px;background:#fff;color:#5b5ea6;font-size:13px;font-weight:600;text-decoration:none;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .nav a.active{background:#5b5ea6;color:#fff}
    h1{font-size:24px;margin-bottom:4px}
    .subtitle{color:#666;margin-bottom:20px;font-size:13px}
    .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
    .stat{background:#fff;border-radius:10px;padding:14px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-width:120px}
    .stat .n{font-size:26px;font-weight:700;color:#5b5ea6}
    .stat .l{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px}
    .filters{background:#fff;border-radius:10px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .filters input[type=text]{padding:7px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;width:200px}
    .filters select{padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
    .filters label{font-size:12px;color:#555;cursor:pointer;display:flex;align-items:center;gap:3px;white-space:nowrap}
    .add-btn{padding:7px 14px;background:#5b5ea6;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
    .add-btn:hover{background:#4a4d95}
    #count{margin-left:auto;color:#888;font-size:12px}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    th{background:#5b5ea6;color:#fff;padding:10px 12px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
    th:hover{background:#4a4d95}
    th .arr{font-size:9px;margin-left:3px;opacity:.4}
    th.sorted .arr{opacity:1}
    td{padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle}
    tr:hover{background:#f8f9ff}
    tr.hot{background:#f0fff4}
    tr.hot:hover{background:#e6ffec}
    tr.unfetched{opacity:.7}
    .nm{font-weight:600;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .un{font-family:Menlo,monospace;font-size:12px;color:#5b5ea6}
    a{color:#5b5ea6;text-decoration:none}
    a:hover{text-decoration:underline}
    .e{color:#ccc}
    .badge{padding:2px 7px;border-radius:4px;font-size:11px;white-space:nowrap}
    .badge-niche{background:#eef;color:#5b5ea6}
    .badge-cat{background:#fef3e2;color:#a06b00}
    .badge-src-seed{background:#e3f2fd;color:#1565c0}
    .badge-src-ddg{background:#f3e5f5;color:#6a1b9a}
    .badge-src-manual{background:#fff3e0;color:#e65100}
    .badge-business{background:#c8e6c9;color:#2e7d32;font-size:10px}
    .badge-private{background:#ffcdd2;color:#c62828;font-size:10px}
    .badge-verified{background:#bbdefb;color:#0d47a1;font-size:10px}
    .signal{display:inline-block;width:18px;height:18px;border-radius:4px;text-align:center;font-size:11px;line-height:18px;font-weight:700}
    .signal.on{background:#28a745;color:#fff}
    .signal.off{background:#eee;color:#bbb}
    .num{text-align:right;font-variant-numeric:tabular-nums}
    .score{text-align:right;font-weight:700;color:#5b5ea6;font-variant-numeric:tabular-nums}
    .bio-cell{max-width:240px;font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .loading{text-align:center;padding:60px;color:#888;font-size:16px}
    .tag-select{padding:3px 6px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:#fff;cursor:pointer;width:120px}
    .tag-select.t-ulasilamadi{background:#fff3cd;border-color:#ffc107}
    .tag-select.t-tekrar{background:#e2e3e5;border-color:#6c757d}
    .tag-select.t-yanlis{background:#f8d7da;border-color:#dc3545}
    .tag-select.t-mail{background:#d4edda;border-color:#28a745}
    .tag-select.t-mesgul{background:#fce4ec;border-color:#e91e63}
    .tag-select.t-toplanti{background:#cce5ff;border-color:#007bff}
    .tag-select.t-musteri{background:#c8e6c9;border-color:#4caf50}
    .tag-select.t-ilgileniyor{background:#d1ecf1;border-color:#17a2b8}
    .tag-select.t-reddetti{background:#f8d7da;border-color:#dc3545}
    .note-cell{max-width:140px;font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .editable{cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .2s}
    .editable:hover{border-bottom-color:#5b5ea6}
    .edit-input{padding:2px 4px;border:1px solid #5b5ea6;border-radius:3px;font-size:12px;width:100%;outline:none;background:#f8f9ff}
  </style>
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/leads">Shopify Leads</a>
    <a href="/ig" class="active">Instagram Leads</a>
  </div>
  <h1>Instagram Lead Finder</h1>
  <p class="subtitle">DM/Yorum otomasyon SaaS - Mesaj trafigi yuksek hesaplar</p>
  <div class="stats" id="stats"></div>
  <div class="filters">
    <input type="text" id="search" placeholder="Username, ad, bio ara..." oninput="applyFilters()">
    <select id="nicheF" onchange="applyFilters()"><option value="">Tum Nisler</option></select>
    <select id="srcF" onchange="applyFilters()">
      <option value="">Tum Kaynaklar</option>
      <option value="seed_shopify">Shopify Seed</option>
      <option value="ddg_discover">DDG Kesif</option>
      <option value="manual">Manuel</option>
    </select>
    <select id="folF" onchange="applyFilters()">
      <option value="">Tum Takipci</option>
      <option value="0-1000">0 - 1K</option>
      <option value="1000-10000">1K - 10K</option>
      <option value="10000-50000">10K - 50K</option>
      <option value="50000-100000">50K - 100K</option>
      <option value="100000-1000000">100K - 1M</option>
      <option value="1000000-9999999999">1M+</option>
    </select>
    <select id="tagF" onchange="applyFilters()">
      <option value="">Tum Durumlar</option>
      <option value="Ulasilamadi">Ulasilamadi</option>
      <option value="Tekrar Aranacak">Tekrar Aranacak</option>
      <option value="Numara Yanlis">Numara Yanlis</option>
      <option value="Mail Iletildi">Mail Iletildi</option>
      <option value="Mesgul">Mesgul</option>
      <option value="Toplanti Alindi">Toplanti Alindi</option>
      <option value="Ilgileniyor">Ilgileniyor</option>
      <option value="Musteri">Musteri</option>
      <option value="Reddetti">Reddetti</option>
      <option value="_none">Durumu Yok</option>
    </select>
    <label><input type="checkbox" id="fDm" onchange="applyFilters()"> DM Sinyali</label>
    <label><input type="checkbox" id="fWa" onchange="applyFilters()"> WhatsApp</label>
    <label><input type="checkbox" id="fWeb" onchange="applyFilters()"> Website</label>
    <label><input type="checkbox" id="fBiz" onchange="applyFilters()"> Business</label>
    <label><input type="checkbox" id="fEnriched" onchange="applyFilters()"> Sadece Enrich Edilmis</label>
    <button class="add-btn" onclick="addManual()">+ Username Ekle</button>
    <span id="count"></span>
  </div>
  <div id="tableWrap"><div class="loading">Yukleniyor...</div></div>
</div>
<script>
let DATA=[];
let sortCol=-1,sortDir='desc';

const TAG_OPTIONS = [
  {value:'',label:'-'},
  {value:'Ulasilamadi',label:'Ulasilamadi'},
  {value:'Tekrar Aranacak',label:'Tekrar Aranacak'},
  {value:'Numara Yanlis',label:'Numara Yanlis'},
  {value:'Mail Iletildi',label:'Mail Iletildi'},
  {value:'Mesgul',label:'Mesgul'},
  {value:'Toplanti Alindi',label:'Toplanti Alindi'},
  {value:'Ilgileniyor',label:'Ilgileniyor'},
  {value:'Musteri',label:'Musteri'},
  {value:'Reddetti',label:'Reddetti'},
];

const TAG_CLASS = {
  'Ulasilamadi':'t-ulasilamadi',
  'Tekrar Aranacak':'t-tekrar',
  'Numara Yanlis':'t-yanlis',
  'Mail Iletildi':'t-mail',
  'Mesgul':'t-mesgul',
  'Toplanti Alindi':'t-toplanti',
  'Ilgileniyor':'t-ilgileniyor',
  'Musteri':'t-musteri',
  'Reddetti':'t-reddetti',
};

const SRC_CLASS = {
  'seed_shopify':'badge-src-seed',
  'ddg_discover':'badge-src-ddg',
  'manual':'badge-src-manual',
};
const SRC_LABEL = {
  'seed_shopify':'Shopify',
  'ddg_discover':'DDG',
  'manual':'Manuel',
};

async function load(){
  try{
    const r=await fetch('/api/ig-leads');
    const json=await r.json();
    DATA = json.rows || json;
  }catch(e){
    document.getElementById('tableWrap').innerHTML='<div class="loading">Veri yuklenemedi</div>';
    return;
  }
  const niches=new Set(DATA.filter(d=>d.niche).map(d=>d.niche));
  const sel=document.getElementById('nicheF');
  [...niches].sort().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o)});
  renderStats();
  renderTable();
}

function renderStats(){
  const t=DATA.length;
  const enriched=DATA.filter(d=>d.ig_fetched_at).length;
  const dm=DATA.filter(d=>d.has_dm_signal).length;
  const wa=DATA.filter(d=>d.has_wa_signal).length;
  const web=DATA.filter(d=>d.has_website).length;
  const biz=DATA.filter(d=>d.is_business).length;
  const tagged=DATA.filter(d=>d.tag).length;
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="n">${t}</div><div class="l">Toplam</div></div>`+
    `<div class="stat"><div class="n">${enriched}</div><div class="l">Enrich Edilmis</div></div>`+
    `<div class="stat"><div class="n">${dm}</div><div class="l">DM Sinyali</div></div>`+
    `<div class="stat"><div class="n">${wa}</div><div class="l">WhatsApp</div></div>`+
    `<div class="stat"><div class="n">${web}</div><div class="l">Website</div></div>`+
    `<div class="stat"><div class="n">${biz}</div><div class="l">Business</div></div>`+
    `<div class="stat"><div class="n">${tagged}</div><div class="l">Taglenmis</div></div>`;
}

function tagSelect(d){
  const cls = TAG_CLASS[d.tag]||'';
  const opts = TAG_OPTIONS.map(o =>
    `<option value="${o.value}"${d.tag===o.value?' selected':''}>${o.label}</option>`
  ).join('');
  return `<select class="tag-select ${cls}" onchange="setTag(${d.id},this.value,this)">${opts}</select>`;
}

async function setTag(id, tag, el){
  el.disabled=true;
  try{
    await fetch('/api/ig-leads',{
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id, tag: tag||null})
    });
    const item=DATA.find(d=>d.id===id);
    if(item) item.tag=tag||null;
    el.className='tag-select '+(TAG_CLASS[tag]||'');
    renderStats();
  }catch(e){
    alert('Hata: '+e.message);
  }
  el.disabled=false;
}

function fmtNum(n){
  if(!n) return '-';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'K';
  return String(n);
}

function signalBadge(on){
  return `<span class="signal ${on?'on':'off'}">${on?'\u2713':'\u00b7'}</span>`;
}

function renderTable(){
  const filtered=getFiltered();
  document.getElementById('count').textContent=`${filtered.length} / ${DATA.length}`;

  const cols=['#','Username','Ad','Skor','Takipci','Post','Niche','Kategori','Bio','DM','WA','Web','Email','Telefon','Web Sitesi','Shopify','Kaynak','Durum','Not'];
  const ths=cols.map((h,i)=>`<th onclick="doSort(${i})"${sortCol===i?' class="sorted"':''}>${h} <span class="arr">${sortCol===i?(sortDir==='asc'?'\u25B2':'\u25BC'):'\u25B2'}</span></th>`).join('');

  let rows='';
  filtered.forEach((d,i)=>{
    const hot=(d.has_dm_signal||d.has_wa_signal)?'hot':'';
    const unf=!d.ig_fetched_at?'unfetched':'';
    const cls=[hot,unf].filter(Boolean).join(' ');

    const igLink=`https://instagram.com/${d.username}`;
    const niche=d.niche||'';
    const cat=d.category||'';
    const bio=d.bio||'';
    const email=d.business_email||'';
    const phone=d.business_phone||d.whatsapp||'';
    const wa=d.whatsapp||d.business_phone||'';
    const ext=d.external_url||'';
    const sho=d.shopify_url||'';
    const src=d.source||'';

    const badges=[];
    if(d.is_business) badges.push('<span class="badge badge-business">B</span>');
    if(d.is_verified) badges.push('<span class="badge badge-verified">\u2713</span>');
    if(d.is_private) badges.push('<span class="badge badge-private">P</span>');

    rows+=`<tr class="${cls}">
      <td>${i+1}</td>
      <td><a href="${igLink}" target="_blank" class="un">@${d.username}</a> ${badges.join('')}</td>
      <td class="nm">${esc(d.full_name||'')||'<span class="e">-</span>'}</td>
      <td class="score">${d.lite_score||0}</td>
      <td class="num">${fmtNum(d.followers)}</td>
      <td class="num">${fmtNum(d.post_count)}</td>
      <td class="editable" onclick="editCell(${d.id},'niche','${esc(niche)}')">${niche?`<span class="badge badge-niche">${niche}</span>`:'<span class="e">-</span>'}</td>
      <td class="editable" onclick="editCell(${d.id},'category','${esc(cat)}')">${cat?`<span class="badge badge-cat">${cat}</span>`:'<span class="e">-</span>'}</td>
      <td class="bio-cell" title="${esc(bio)}">${bio||'<span class="e">-</span>'}</td>
      <td>${signalBadge(d.has_dm_signal)}</td>
      <td>${signalBadge(d.has_wa_signal)}</td>
      <td>${signalBadge(d.has_website)}</td>
      <td class="editable" onclick="editCell(${d.id},'business_email','${esc(email)}')">${email?`<a href="mailto:${email}" onclick="event.stopPropagation()">${email}</a>`:'<span class="e">-</span>'}</td>
      <td class="editable" onclick="editCell(${d.id},'business_phone','${esc(phone)}')">${phone?`<a href="tel:${phone}" onclick="event.stopPropagation()">${phone}</a>`:'<span class="e">-</span>'}</td>
      <td>${ext?`<a href="${ext}" target="_blank">Ac</a>`:'<span class="e">-</span>'}</td>
      <td>${sho?`<a href="${sho}" target="_blank">Sho</a>`:'<span class="e">-</span>'}</td>
      <td>${src?`<span class="badge ${SRC_CLASS[src]||''}">${SRC_LABEL[src]||src}</span>`:'<span class="e">-</span>'}</td>
      <td>${tagSelect(d)}</td>
      <td class="note-cell editable" onclick="editCell(${d.id},'notes','${esc(d.notes||'')}')" title="${esc(d.notes||'')}">${d.notes||'<span class="e">-</span>'}</td>
    </tr>`;
  });

  document.getElementById('tableWrap').innerHTML=`<table><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const niche=document.getElementById('nicheF').value;
  const src=document.getElementById('srcF').value;
  const fol=document.getElementById('folF').value;
  const tagFilter=document.getElementById('tagF').value;
  const fDm=document.getElementById('fDm').checked;
  const fWa=document.getElementById('fWa').checked;
  const fWeb=document.getElementById('fWeb').checked;
  const fBiz=document.getElementById('fBiz').checked;
  const fEnr=document.getElementById('fEnriched').checked;

  let arr=DATA.filter(d=>{
    if(q){
      const txt=`${d.username||''} ${d.full_name||''} ${d.bio||''} ${d.niche||''} ${d.category||''}`.toLowerCase();
      if(!txt.includes(q))return false;
    }
    if(niche&&d.niche!==niche)return false;
    if(src&&d.source!==src)return false;
    if(fol){
      const [lo,hi]=fol.split('-').map(Number);
      const f=d.followers||0;
      if(f<lo||f>hi)return false;
    }
    if(tagFilter==='_none'&&d.tag)return false;
    if(tagFilter&&tagFilter!=='_none'&&d.tag!==tagFilter)return false;
    if(fDm&&!d.has_dm_signal)return false;
    if(fWa&&!d.has_wa_signal)return false;
    if(fWeb&&!d.has_website)return false;
    if(fBiz&&!d.is_business)return false;
    if(fEnr&&!d.ig_fetched_at)return false;
    return true;
  });

  const TAG_ORDER = {'Musteri':1,'Toplanti Alindi':2,'Ilgileniyor':3,'Mail Iletildi':4,'Tekrar Aranacak':5,'Mesgul':6,'Ulasilamadi':7,'Numara Yanlis':8,'Reddetti':9};
  arr.sort((a,b)=>{
    const ta = a.tag ? (TAG_ORDER[a.tag]||7) : 99;
    const tb = b.tag ? (TAG_ORDER[b.tag]||7) : 99;
    if(ta !== tb) return ta - tb;
    return 0;
  });

  if(sortCol>=0) {
    const tagged = arr.filter(d=>d.tag);
    const untagged = arr.filter(d=>!d.tag);
    arr = [...tagged, ...sortData(untagged)];
  }
  return arr;
}

function sortData(arr){
  const key=[null,'username','full_name','lite_score','followers','post_count','niche','category',null,null,null,null,null,null,null,null,null,'tag','notes'][sortCol];
  if(!key)return arr;
  const numKeys=new Set(['lite_score','followers','post_count']);
  return arr.slice().sort((a,b)=>{
    let va=a[key]??'', vb=b[key]??'';
    if(numKeys.has(key)){
      va=Number(va)||0; vb=Number(vb)||0;
      return sortDir==='asc'?va-vb:vb-va;
    }
    va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
    return sortDir==='asc'?va.localeCompare(vb,'tr'):vb.localeCompare(va,'tr');
  });
}

function doSort(col){
  if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
  else{sortCol=col;sortDir='desc';}
  renderTable();
}

function esc(s){return (s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;')}

function editCell(id, field, current){
  const td=event.currentTarget;
  if(td.querySelector('.edit-input')) return;
  const input=document.createElement('input');
  input.className='edit-input';
  input.value=current;
  td.innerHTML='';
  td.appendChild(input);
  input.focus();
  input.select();

  async function save(){
    const val=input.value.trim();
    const body={id};
    body[field]=val;

    try{
      const r=await fetch('/api/ig-leads',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok) throw new Error('API hata');
      const item=DATA.find(d=>d.id===id);
      if(item) item[field]=val||null;
      renderStats();
      renderTable();
    }catch(e){alert('Hata: '+e.message);renderTable();}
  }

  input.addEventListener('keydown',e=>{
    if(e.key==='Enter') save();
    if(e.key==='Escape') renderTable();
  });
  input.addEventListener('blur',save);
}

async function addManual(){
  const username=prompt('Instagram username (ornek: bilkayozdemir):');
  if(!username) return;
  const niche=prompt('Niche (ornek: butik) - bos birakabilirsin:') || null;
  try{
    const r=await fetch('/api/ig-leads',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username, niche})
    });
    const json=await r.json();
    if(!r.ok) throw new Error(json.error||'API hata');
    alert('Eklendi: @'+(json.lead?.username||username)+'\nEnrich cron 15dk icinde calisir.');
    load();
  }catch(e){alert('Hata: '+e.message);}
}

function applyFilters(){renderTable()}

load();
</script>
</body>
</html>
